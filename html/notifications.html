<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications | VIRAT-7</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">

<style>

body{
background:#f4f6fb;
}

.notifications{
padding:16px;
}

.notify-card{
background:#fff;
border-radius:14px;
padding:14px;
margin-bottom:12px;
display:flex;
gap:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.notify-card.unread{
border-left:4px solid #5a67d8;
background:#f8f9ff;
}

.notify-icon{
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:18px;
background:#eef2ff;
color:#5a67d8;
flex-shrink:0;
}

.notify-content h4{
font-size:15px;
margin-bottom:4px;
}

.notify-content p{
font-size:13px;
color:#555;
}

.notify-footer{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:6px;
}

.notify-time{
font-size:11px;
color:#888;
}

.notify-badge{
background:#5a67d8;
color:white;
font-size:10px;
padding:3px 8px;
border-radius:20px;
}

.empty{
text-align:center;
margin-top:80px;
color:#777;
}

.empty i{
font-size:40px;
color:#bbb;
margin-bottom:10px;
}

</style>
</head>

<body>

<header class="app-header">

<button class="back-btn" id="backBtn">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h3 class="page-title">Notifications</h3>

<div style="width:40px"></div>

</header>

<main class="notifications" id="notifyList">

<div class="empty">

<i class="fa-solid fa-bell"></i>
<p>No notifications yet</p>

</div>

</main>


<script type="module">

import { auth, db } from "../js/firebase.js";

import {
collection,
query,
onSnapshot,
doc,
getDoc,
updateDoc,
arrayUnion
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { onAuthStateChanged }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const container=document.getElementById("notifyList");


/* ===============================
FORMAT TIME
=============================== */

function formatTime(timestamp){

if(!timestamp) return "";

const date = timestamp.toDate();
const now = new Date();

const diff = Math.floor((now - date) / 1000);

if(diff < 60) return "Just now";

if(diff < 3600) return Math.floor(diff/60)+" min ago";

if(diff < 86400) return Math.floor(diff/3600)+" hrs ago";

return date.toLocaleDateString();

}


/* ===============================
AUTH STATE
=============================== */

onAuthStateChanged(auth,async(user)=>{

if(!user){

window.location.href="../login.html";
return;

}

/* GET USER DATA */

const userSnap=await getDoc(doc(db,"users",user.uid));
const userData=userSnap.data();
const userFlat=userData.flat;


/* QUERY NOTIFICATIONS */

const q=query(collection(db,"notifications"));

onSnapshot(q,(snap)=>{

container.innerHTML="";

let list=[];

snap.forEach(docSnap=>{
list.push({id:docSnap.id,...docSnap.data()});
});


/* SORT NEWEST FIRST */

list.sort((a,b)=>{
return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
});


list.forEach(n=>{

/* SHOW ONLY RELEVANT */

if(n.to!=="all" && n.to!==userFlat) return;

const read=n.readBy?.includes(user.uid);

container.innerHTML+=`

<div class="notify-card ${read ? "" : "unread"}">

<div class="notify-icon">
<i class="fa-solid fa-bell"></i>
</div>

<div class="notify-content">

<h4>${n.title}</h4>

<p>${n.message}</p>

<div class="notify-footer">

<span class="notify-time">
${formatTime(n.createdAt)}
</span>

${!read ? `<span class="notify-badge">New</span>` : ""}

</div>

</div>

</div>

`;


/* MARK AS READ */

if(!read){

updateDoc(doc(db,"notifications",n.id),{
readBy:arrayUnion(user.uid)
});

}

});


if(container.innerHTML===""){

container.innerHTML=`

<div class="empty">
<i class="fa-solid fa-bell-slash"></i>
<p>No notifications yet</p>
</div>

`;

}

});

});

</script>


<script>

document.getElementById("backBtn").addEventListener("click", () => {

if (history.length > 1) {
history.back();
} else {
window.location.href = "../dashboard.html";
}

});

</script>

</body>
</html>
