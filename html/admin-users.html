<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Manage Users | VIRAT-7</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">

<style>

body{
background:linear-gradient(180deg,#f4f6fb,#eef1ff);
font-family:Poppins,sans-serif;
}

/* PAGE */

.admin-wrapper{
padding:20px;
max-width:1100px;
margin:auto;
}

/* FILTER BAR */

.filters{

display:flex;
gap:12px;
margin-bottom:18px;

}

.input-box{

flex:1;

padding:12px 14px;

border-radius:12px;

border:1px solid #ddd;

font-size:14px;

background:#fff;

transition:.2s;

}

.input-box:focus{

border-color:#5a67d8;
outline:none;

box-shadow:0 0 0 2px rgba(90,103,216,.2);

}

/* USER GRID */

#userList{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(250px,1fr));

gap:18px;

}

/* USER CARD */

.user-card{

background:#fff;

border-radius:18px;

padding:20px;

box-shadow:0 8px 22px rgba(0,0,0,.08);

transition:.25s;

position:relative;

overflow:hidden;

}

.user-card:hover{

transform:translateY(-6px);

box-shadow:0 18px 32px rgba(0,0,0,.12);

}

/* AVATAR */

.user-avatar{

width:54px;
height:54px;

border-radius:50%;

background:linear-gradient(135deg,#5a67d8,#7f9cf5);

display:flex;
align-items:center;
justify-content:center;

color:#fff;

font-weight:600;
font-size:20px;

margin-bottom:10px;

}

/* NAME */

.user-name{

font-size:16px;

font-weight:600;

margin-bottom:3px;

}

/* EMAIL */

.user-email{

font-size:13px;

color:#777;

margin-bottom:8px;

word-break:break-all;

}

/* FLAT */

.user-flat{

font-size:13px;

color:#555;

margin-bottom:12px;

}

/* ROLE BADGE */

.role-badge{

position:absolute;

top:12px;
right:12px;

font-size:11px;

padding:4px 8px;

border-radius:8px;

font-weight:500;

}

.role-admin{

background:#ffe3e3;

color:#c53030;

}

.role-resident{

background:#e6edff;

color:#4c5ed7;

}

/* ROLE SELECT */

.role-select{

width:100%;

padding:7px;

border-radius:8px;

border:1px solid #ddd;

font-size:13px;

cursor:pointer;

}

/* MOBILE */

@media(max-width:600px){

.filters{
flex-direction:column;
}

}

</style>

</head>


<body>

<header class="app-header">

<button class="back-btn" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h3 class="page-title">Manage Users</h3>

<div style="width:40px"></div>

</header>


<main class="admin-wrapper">

<div class="filters">

<input
id="userSearch"
class="input-box"
placeholder="Search user..."
onkeyup="filterUsers()"
/>

<select id="roleFilter" onchange="filterUsers()" class="input-box">

<option value="all">All</option>
<option value="resident">Residents</option>
<option value="admin">Admins</option>

</select>

</div>

<div id="userList"></div>

</main>

<script type="module" src="../js/admin-users.js"></script>

</body>
</html>
