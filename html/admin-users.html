<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Manage Users | VIRAT-7</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
rel="stylesheet">

<style>

*{
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#eef1ff,#f7f8ff,#eef1ff);
}

.admin-wrapper{
padding:20px;
max-width:1200px;
margin:auto;
}

.filters{
display:flex;
gap:12px;
margin-bottom:20px;
flex-wrap:wrap;
}

.input-box{
flex:1;
min-width:150px;
padding:12px;
border-radius:12px;
border:1px solid #e2e5ff;
background:#fff;
}

#userList{
display:grid;
grid-template-columns:
repeat(auto-fill,minmax(300px,1fr));
gap:18px;
}

.user-card{
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
position:relative;
transition:.2s;
display:flex;
flex-direction:column;
gap:6px;
}

.user-card:hover{
transform:translateY(-3px);
box-shadow:0 14px 28px rgba(0,0,0,.12);
}

.user-avatar{
width:56px;
height:56px;
border-radius:50%;
background:linear-gradient(135deg,#5a67d8,#7f9cf5);
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-weight:600;
}

.user-name{
font-weight:600;
font-size:16px;
display:flex;
gap:6px;
align-items:center;
}

.edit-btn{
border:none;
padding:3px 6px;
font-size:11px;
border-radius:6px;
background:#e6edff;
cursor:pointer;
}

.user-email{
font-size:13px;
color:#777;
}

.user-pass{
font-size:13px;
display:flex;
gap:6px;
align-items:center;
}

.pass-text{
background:#f3f4ff;
padding:2px 6px;
border-radius:6px;
font-family:monospace;
}

.eye-btn{
cursor:pointer;
color:#5a67d8;
}

.user-flat{
font-size:13px;
display:flex;
gap:6px;
align-items:center;
}

.flat-btn{
border:none;
padding:3px 6px;
font-size:11px;
border-radius:6px;
background:#5a67d8;
color:#fff;
cursor:pointer;
}

.role-badge{
position:absolute;
top:12px;
right:12px;
font-size:11px;
padding:4px 8px;
border-radius:8px;
}

.role-admin{
background:#ffe3e3;
color:#c53030;
}

.role-resident{
background:#e6edff;
color:#4c5ed7;
}

.role-select{
width:100%;
padding:8px;
border-radius:8px;
border:1px solid #ddd;
margin-top:6px;
}


/* POPUPS */

.confirm-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.35);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.25s;
z-index:9999;
}

.confirm-overlay.show{
opacity:1;
pointer-events:auto;
}

.confirm-modal{
background:#fff;
padding:22px;
border-radius:18px;
width:90%;
max-width:340px;
text-align:center;
transform:scale(.85);
transition:.25s;
}

.confirm-overlay.show .confirm-modal{
transform:scale(1);
}

.confirm-actions{
display:flex;
gap:10px;
margin-top:12px;
}

.btn-cancel{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#eee;
}

.btn-ok{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#5a67d8;
color:white;
}


/* EDIT POPUP UI */

.edit-input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
outline:none;
}

.phone-box{
display:flex;
}

.phone-prefix{
padding:12px;
background:#eef1ff;
border:1px solid #ddd;
border-right:none;
border-radius:10px 0 0 10px;
}

.phone-input{
flex:1;
padding:12px;
border:1px solid #ddd;
border-radius:0 10px 10px 0;
outline:none;
}

.error-text{
color:red;
font-size:12px;
margin-top:6px;
display:none;
}

</style>

</head>

<body>


<header class="app-header">

<button class="back-btn" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h3 class="page-title">
Manage Users
</h3>

<div style="width:40px"></div>

</header>


<main class="admin-wrapper">

<div class="filters">

<input id="userSearch" class="input-box"
placeholder="Search user..."
onkeyup="filterUsers()" />

<select id="roleFilter"
class="input-box"
onchange="filterUsers()">

<option value="all">All</option>
<option value="resident">Residents</option>
<option value="admin">Admins</option>

</select>

</div>

<div id="userList"></div>

</main>


<!-- CONFIRM -->

<div id="confirmBox" class="confirm-overlay">
<div class="confirm-modal">

<h3 id="confirmTitle">Confirm</h3>
<p id="confirmText"></p>

<div class="confirm-actions">
<button onclick="closeConfirm()" class="btn-cancel">Cancel</button>
<button onclick="confirmYes()" class="btn-ok">Yes</button>
</div>

</div>
</div>


<!-- FLAT -->

<div id="flatBox" class="confirm-overlay">
<div class="confirm-modal">

<h3>Set Flat</h3>

<input id="flatInput" class="edit-input">

<div class="confirm-actions">
<button onclick="closeFlat()" class="btn-cancel">Cancel</button>
<button onclick="saveFlat()" class="btn-ok">Save</button>
</div>

</div>
</div>


<!-- EDIT -->

<div id="editBox" class="confirm-overlay">

<div class="confirm-modal">

<h3 id="editTitle">Edit</h3>

<div id="phoneBox" class="phone-box" style="display:none">

<div class="phone-prefix">+91</div>

<input id="editInputPhone"
class="phone-input"
maxlength="10">

</div>

<input id="editInput"
class="edit-input">

<p id="editError" class="error-text">
Invalid
</p>

<div class="confirm-actions">

<button onclick="closeEdit()" class="btn-cancel">
Cancel
</button>

<button onclick="saveEdit()" class="btn-ok">
Save
</button>

</div>

</div>

</div>


<script>

function togglePass(id){

const el=document.getElementById(id)

if(el.dataset.show==="1"){
el.innerText="••••••"
el.dataset.show="0"
}else{
el.innerText=el.dataset.pass
el.dataset.show="1"
}

}

</script>


<script type="module"
src="../js/admin-users.js">
</script>

</body>
</html>
