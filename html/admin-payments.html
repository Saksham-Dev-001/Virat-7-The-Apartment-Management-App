<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Admin Payments | VIRAT-7</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">

<style>

body{
background:#f4f6fb;
font-family:Poppins,sans-serif;
margin:0;
}


/* ================= WRAPPER ================= */

.wrapper{
padding:18px;
max-width:1000px;
margin:auto;
}


/* ================= FILTERS ================= */

.filters{
display:flex;
gap:10px;
margin-bottom:14px;
flex-wrap:wrap;
}

.filters input,
.filters select{

flex:1;

padding:12px;

border-radius:10px;

border:1px solid #ddd;

}


/* ================= SECTION ================= */

.section-title{

font-weight:600;
margin:16px 0 8px;

}


/* ================= CARD ================= */

.card{

background:#fff;

border-radius:16px;

padding:16px;

margin-bottom:12px;

box-shadow:0 8px 20px rgba(0,0,0,.08);

}


/* ================= TEXT ================= */

.card-title{
font-size:15px;
font-weight:600;
}

.card-sub{
font-size:13px;
color:#666;
margin-top:2px;
}

.amount{
font-size:18px;
font-weight:600;
color:#5a67d8;
margin-top:6px;
}


/* ================= BADGE ================= */

.badges{
margin-top:8px;
display:flex;
gap:6px;
}

.badge{
padding:4px 8px;
font-size:11px;
border-radius:6px;
}

.pending{
background:#ffe5e5;
color:#c53030;
}

.paid{
background:#c6f6d5;
color:#065f46;
}

.pendingApproval{
background:#fff3cd;
color:#856404;
}


/* ================= IMAGE ================= */

.proof{
width:100%;
border-radius:8px;
margin-top:8px;
}


/* ================= BUTTONS ================= */

.buttons{
margin-top:10px;
display:flex;
gap:8px;
}

button{
flex:1;
padding:8px;
border:none;
border-radius:8px;
font-size:12px;
cursor:pointer;
}

.btn-paid{
background:#5a67d8;
color:#fff;
}

.btn-delete{
background:#eee;
}


/* ================= EMPTY ================= */

.empty{
padding:20px;
text-align:center;
color:#777;
}

</style>

</head>

<body>


<!-- HEADER -->

<header class="app-header">

<button class="back-btn">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h3 class="page-title">Payments</h3>

<div class="header-spacer"></div>

</header>



<div class="wrapper">


<!-- FILTERS -->

<div class="filters">

<input id="search" placeholder="Search flat">

<select id="statusFilter">

<option value="all">All</option>
<option value="pending">Pending</option>
<option value="paid">Paid</option>
<option value="pendingApproval">Pending Approval</option>

</select>

</div>


<!-- LIST -->

<div id="list"></div>


</div>



<script type="module"
src="../js/admin-payments.js"></script>



<script>

/* BACK BUTTON FIX */

const backBtn = document.querySelector(".back-btn");

if(backBtn){

backBtn.onclick = () => {

if (history.length > 1) {

history.back();

} else {

location.href = "admin.html";

}

};

}

</script>


</body>
</html>
