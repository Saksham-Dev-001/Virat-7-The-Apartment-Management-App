<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Maintenance | Admin</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">

<style>

/* ========= PAGE ========= */

.container{
padding:14px;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card{
background:#fff;
border-radius:16px;
padding:16px;
box-shadow:0 6px 16px rgba(0,0,0,.08);
}

/* ========= INPUT ========= */

input,select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#5a67d8,#4c51bf);
color:white;
cursor:pointer;
}

/* ========= RECENT ========= */

.recent{
grid-column:1/3;
}

.recent-due{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #eee;
}

.edit-btn{
background:#5a67d8;
}

.delete-btn{
background:#e53e3e;
}

.edit-btn,.delete-btn{
border:none;
padding:6px 10px;
border-radius:6px;
color:white;
margin-left:5px;
cursor:pointer;
}


</style>

</head>

<body>


<header class="app-header">

<button class="back-btn" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h3 class="page-title">Maintenance</h3>

<div class="header-spacer"></div>

</header>



<div class="container">


<!-- CREATE -->

<div class="card">

<h3>Create New Due</h3>

<select id="flat">
<option value="">Select Flat</option>
</select>

<input id="amount" type="number" placeholder="Amount ₹">

<select id="type">
<option>Maintenance</option>
<option>Water</option>
<option>Electricity</option>
</select>

<select id="month"></select>

<button onclick="createDue()">
Create Due
</button>

</div>



<!-- GENERATE -->

<div class="card">

<h3>Generate For All Flats</h3>

<input id="genAmount" type="number" placeholder="Amount ₹">

<select id="genType">
<option>Maintenance</option>
<option>Water</option>
<option>Electricity</option>
</select>

<select id="genMonth"></select>

<button onclick="generateAll()">
Generate For All
</button>

</div>



<!-- SUMMARY -->

<div class="card">

<h3>Total Summary</h3>

Total Bills:
<b id="totalBills">0</b><br>

Total Amount:
<b id="totalAmount">₹0</b><br>

Paid:
<b id="paidAmount">₹0</b><br>

Pending:
<b id="pendingAmount">₹0</b>

</div>



<!-- RECENT -->

<div class="card recent">

<h3>Recent Dues</h3>

<div id="recentDues">
No dues
</div>

</div>


</div>



<script type="module">

import { db } from "../js/firebase.js";

import {
collection,
query,
orderBy,
onSnapshot,
doc,
deleteDoc,
updateDoc,
getDocs,
addDoc
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


/* ========= MONTHS ========= */

const month = document.getElementById("month");
const genMonth = document.getElementById("genMonth");

const months = [
"January","February","March","April","May","June",
"July","August","September","October","November","December"
];

const now = new Date();

month.innerHTML="";
genMonth.innerHTML="";

for(let i=0;i<12;i++){

const m = (now.getMonth()+i)%12;
const y = now.getFullYear() + Math.floor((now.getMonth()+i)/12);

const text = months[m] + " " + y;

month.innerHTML += `<option value="${text}">${text}</option>`;
genMonth.innerHTML += `<option value="${text}">${text}</option>`;

}


/* ========= LOAD FLATS ========= */

const flatSelect = document.getElementById("flat");

async function loadFlats(){

flatSelect.innerHTML =
`<option value="">Select Flat</option>`;

const snap = await getDocs(
collection(db,"users")
);

const used = new Set();

snap.forEach(docSnap=>{

const u = docSnap.data();

const flat =
u.flat ||
u.flatNo ||
u.flat_number ||
u.room ||
u.flatno ||
"";

if(!flat) return;

if(used.has(flat)) return;

used.add(flat);

flatSelect.innerHTML +=
`<option value="${flat}">
${flat}
</option>`;

});

}

loadFlats();



/* ========= CREATE ========= */

window.createDue = async function(){

const flat = flatSelect.value;
const amount = document.getElementById("amount").value;

if(flat === ""){
alert("Select Flat");
return;
}

if(amount === ""){
alert("Enter Amount");
return;
}

await addDoc(
collection(db,"dues"),
{
flat: flat,
amount: Number(amount),
type: document.getElementById("type").value,
month: month.value,
status:"pending",
createdAt:new Date()
}
);

alert("Due created");

};



/* ========= GENERATE ========= */

window.generateAll=async function(){

const amount=document.getElementById("genAmount").value;

if(!amount){
alert("Enter amount");
return;
}

const snap=await getDocs(collection(db,"users"));

for(const d of snap.docs){

const f=d.data().flat;

if(!f) continue;

await addDoc(collection(db,"dues"),{

flat:f,
amount:Number(amount),
type:document.getElementById("genType").value,
month:genMonth.value,
status:"pending",
createdAt:new Date()

});

}

alert("Generated");

};



/* ========= LOAD ========= */

const container=document.getElementById("recentDues");

onSnapshot(
query(
collection(db,"dues"),
orderBy("createdAt","desc")
),
snap=>{

container.innerHTML="";

let total=0;
let paid=0;
let pending=0;
let bills=0;

snap.forEach(docSnap=>{

const d=docSnap.data();

bills++;
total+=Number(d.amount);

if(d.status==="paid")
paid+=Number(d.amount);
else
pending+=Number(d.amount);

container.innerHTML+=`

<div class="recent-due">

<div>

<b>${d.flat}</b><br>
${d.month} • ₹${d.amount}

</div>

<div>

<button class="edit-btn"
onclick="editDue('${docSnap.id}','${d.amount}')">
Edit
</button>

<button class="delete-btn"
onclick="deleteDue('${docSnap.id}')">
Delete
</button>

</div>

</div>

`;

});

totalBills.innerText=bills;
totalAmount.innerText="₹"+total;
paidAmount.innerText="₹"+paid;
pendingAmount.innerText="₹"+pending;

});



/* ========= DELETE ========= */

window.deleteDue=async id=>{

if(!confirm("Delete?")) return;

await deleteDoc(doc(db,"dues",id));

};



/* ========= EDIT ========= */

window.editDue=async(id,a)=>{

const v=prompt("Edit amount",a);

if(!v) return;

await updateDoc(
doc(db,"dues",id),
{amount:Number(v)}
);

};

</script>

</body>
</html>
