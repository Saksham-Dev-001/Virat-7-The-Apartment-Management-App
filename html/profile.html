<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile | VIRAT-7</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">

<style>

body{
background:#f4f6fb;
font-family:Poppins,sans-serif;
}

/* ---------- TOP HEADER SPACE ---------- */

main{
padding:16px;
}

/* ---------- PROFILE CARD ---------- */

.profile-card{

background:#fff;
border-radius:18px;
overflow:hidden;
max-width:420px;
margin:auto;

box-shadow:0 15px 35px rgba(0,0,0,.08);

}


/* ---------- TOP GRADIENT ---------- */

.profile-top{

background:linear-gradient(135deg,#5a67d8,#667eea);
color:#fff;
padding:30px 20px 40px;
text-align:center;
position:relative;

}

.avatar{

width:95px;
height:95px;
border-radius:50%;

background:#fff;
color:#5a67d8;

font-size:36px;
font-weight:700;

display:flex;
align-items:center;
justify-content:center;

margin:auto;
margin-bottom:10px;

box-shadow:0 8px 20px rgba(0,0,0,.2);

}

.user-name{

font-size:20px;
font-weight:600;

}

.role-badge{

display:inline-block;
margin-top:6px;
font-size:12px;

background:rgba(255,255,255,.2);
padding:4px 10px;
border-radius:20px;

}


/* ---------- EDIT BTN ---------- */

.edit-btn{

position:absolute;
top:12px;
right:12px;

background:#fff;
color:#5a67d8;

border:none;
border-radius:10px;

padding:6px 10px;
font-size:13px;
cursor:pointer;

box-shadow:0 4px 10px rgba(0,0,0,.2);

}


/* ---------- INFO ---------- */

.profile-info{

padding:18px;

}

.info-row{

display:flex;
justify-content:space-between;
align-items:center;

padding:12px 0;

border-bottom:1px solid #eee;

font-size:14px;

}

.info-left{

display:flex;
gap:10px;
align-items:center;

color:#555;

}

.info-right{

font-weight:500;

}


/* ---------- ACTION BUTTONS ---------- */

.action-row{

display:flex;
gap:10px;
margin-top:12px;

}

.small-btn{

flex:1;

border:none;
padding:8px;
border-radius:10px;

font-size:13px;
cursor:pointer;

}

.copy-btn{

background:#edf2ff;
color:#5a67d8;

}

.call-btn{

background:#e6fffa;
color:#0d9488;

}


/* ---------- LOGOUT ---------- */

.logout-btn{

margin:16px;

width:calc(100% - 32px);

padding:14px;

background:linear-gradient(135deg,#ff4d4d,#ff6b6b);

border:none;
border-radius:14px;

color:#fff;
font-size:15px;
font-weight:600;

cursor:pointer;

box-shadow:0 8px 20px rgba(255,0,0,.25);

}

</style>
</head>

<body>


<header class="app-header">

<button class="back-btn" id="backBtn">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h3 class="page-title">Profile</h3>

<div class="header-spacer"></div>

</header>


<main>


<div class="profile-card">


<!-- TOP -->

<div class="profile-top">

<button class="edit-btn">
<i class="fa-solid fa-pen"></i>
</button>

<div id="avatar" class="avatar">A</div>

<div id="userName" class="user-name">User</div>

<div id="pRole" class="role-badge">user</div>

</div>


<!-- INFO -->

<div class="profile-info">


<div class="info-row">

<div class="info-left">
<i class="fa-solid fa-envelope"></i>
Email
</div>

<div id="pEmail" class="info-right"></div>

</div>


<div class="info-row">

<div class="info-left">
<i class="fa-solid fa-building"></i>
Flat
</div>

<div id="pFlat" class="info-right"></div>

</div>


<div class="info-row">

<div class="info-left">
<i class="fa-solid fa-phone"></i>
Phone
</div>

<div id="pPhone" class="info-right"></div>

</div>


<div class="action-row">

<button class="small-btn copy-btn" id="copyEmail">
Copy Email
</button>

<button class="small-btn call-btn" id="callPhone">
Call
</button>

</div>


</div>


<button id="logoutBtn" class="logout-btn">
🚪 Logout
</button>


</div>


</main>



<script type="module">

import { loadUserData } from "../js/user-data.js";
import { logoutUser } from "../js/auth.js";

document.getElementById("logoutBtn").onclick = logoutUser;

document.getElementById("backBtn").onclick = ()=>{
window.location.href="../dashboard.html";
};


let phone = "";
let email = "";


loadUserData((user)=>{

document.getElementById("userName").innerText=user.name;
document.getElementById("pEmail").innerText=user.email;
document.getElementById("pFlat").innerText=user.flat;
document.getElementById("pPhone").innerText=user.phone;
document.getElementById("pRole").innerText=user.role;

document.getElementById("avatar").innerText =
user.name[0].toUpperCase();

phone = user.phone;
email = user.email;

});


/* COPY EMAIL */

document.getElementById("copyEmail").onclick=()=>{

navigator.clipboard.writeText(email);

alert("Email copied");

};


/* CALL */

document.getElementById("callPhone").onclick=()=>{

if(phone)
location.href="tel:"+phone;

};

</script>


</body>
</html>
