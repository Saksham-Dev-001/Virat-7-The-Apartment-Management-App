<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>My Dues | VIRAT-7</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">

<style>

/* ================= GLOBAL ================= */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui;
background:#eef1f8;
color:#222;
}


/* ================= PAGE ================= */

.page-content{
padding:14px;
display:flex;
flex-direction:column;
gap:14px;
}


/* ================= CARD ================= */

.card{
background:white;
border-radius:16px;
padding:16px;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
display:flex;
flex-direction:column;
gap:6px;
}


/* ================= ICON ================= */

.card i{
color:#5a67d8;
}


/* ================= AMOUNT ================= */

.amount{
font-size:22px;
font-weight:bold;
}


/* ================= STATUS ================= */

.status{
font-weight:bold;
padding:4px 8px;
border-radius:8px;
display:inline-block;
font-size:13px;
}

.pending{
background:#ffe5e5;
color:#c00;
}

.paid{
background:#e5ffe7;
color:#008a00;
}

.pendingApproval{
background:#fff3cd;
color:#c67c00;
}


/* ================= BUTTON ================= */

.pay-btn{
margin-top:8px;
padding:10px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#5a67d8,#4c51bf);
color:white;
font-weight:bold;
cursor:pointer;
}

.pay-btn:active{
transform:scale(.97);
}


/* ================= EMPTY ================= */

.empty{
text-align:center;
padding:30px;
}

.empty i{
font-size:40px;
color:#5a67d8;
}

</style>

</head>


<body>


<header class="app-header">
  
  <button class="back-btn" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i>
  </button>
  
  <h3 class="page-title">My Dues</h3>
  
  <div style="width:40px"></div>
  
</header>



<main class="page-content" id="duesContainer">

<div class="card empty">
<i class="fa-solid fa-spinner fa-spin"></i>
<p>Loading dues...</p>
</div>

</main>



<script type="module">

import { auth, db } from "../js/firebase.js";

import {
collection,
query,
where,
onSnapshot,
doc,
getDoc,
addDoc,
serverTimestamp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


const container =
document.getElementById("duesContainer");



onAuthStateChanged(auth, async (user)=>{

if(!user){
window.location.href="../login.html";
return;
}


const userRef =
doc(db,"users",user.uid);

const snap =
await getDoc(userRef);

if(!snap.exists()) return;

const userData = snap.data();
const userFlat = userData.flat;


/* ===== LOAD DUES ===== */

const q = query(
collection(db,"dues"),
where("flat","==",userFlat)
);


onSnapshot(q,(snapshot)=>{

container.innerHTML="";


if(snapshot.empty){

container.innerHTML=`

<div class="card empty">

<i class="fa-solid fa-circle-check"></i>

<h3>No Pending Dues</h3>

<p>You’re all clear 🎉</p>

</div>

`;

return;

}


snapshot.forEach(docSnap=>{

const d = docSnap.data();

let statusClass="pending";

if(d.status==="paid") statusClass="paid";
if(d.status==="pendingApproval") statusClass="pendingApproval";


container.innerHTML+=`

<div class="card">

<i class="fa-solid fa-wallet"></i>

<div class="amount">
₹ ${d.amount}
</div>

<div>
${d.type} • ${d.month}
</div>

<div>

<span class="status ${statusClass}">
${d.status}
</span>

</div>

${d.status==="pending" ? `

<button
class="pay-btn"
onclick="payDue('${docSnap.id}','${d.amount}','${userFlat}')">

Pay Now

</button>

` : ""}

</div>

`;

});


});

});



/* ================= PAY ================= */

window.payDue = async function(dueId,amount,flat){

/* ===============================
UPI LINK
=============================== */

const upiId = "9351520926@fam";   // change to real UPI
const name  = "Virat-7 Mgmt";

const upiLink =
`upi://pay?pa=${upiId}&pn=${encodeURIComponent(name)}&am=${amount}&cu=INR`;


/* ===============================
OPEN UPI APP
=============================== */

window.location.href = upiLink;


/* ===============================
WAIT THEN ASK REF
=============================== */

setTimeout(async ()=>{

const proof = prompt(
"Enter UPI Ref No or Screenshot URL"
);

if(!proof) return;

try{

await addDoc(
collection(db,"payments"),
{
dueId: dueId,
flat: flat,
amount: amount,
proof: proof,
status: "pending",
createdAt: serverTimestamp()
}
);

alert("Payment sent for approval");

}catch(err){

console.error(err);
alert("Payment failed");

}

},3000);

};

</script>



<script>

backBtn.onclick=()=>{
window.location.href="../dashboard.html";
};

</script>


</body>
</html>
