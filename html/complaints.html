<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Complaints | VIRAT-7</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">

<style>

/* ===== THEME ===== */

body{
background:linear-gradient(180deg,#f8f9ff,#eef1f7);
font-family:Poppins,sans-serif;
color:#222;
}

/* ===== WRAPPER ===== */

.wrapper{
padding:22px;
max-width:1000px;
margin:auto;
}

/* ===== SECTION TITLE ===== */

.section-title{
font-size:18px;
font-weight:600;
margin-bottom:14px;
display:flex;
align-items:center;
gap:8px;
}

/* ===== CREATE CARD ===== */

.create-card{
background:#fff;
border-radius:18px;
padding:22px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
margin-bottom:26px;
border:1px solid #edf0f7;
}

/* ===== INPUTS ===== */

.input{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #e2e8f0;
margin-bottom:14px;
font-size:14px;
transition:.25s;
}

.input:focus{
outline:none;
border-color:#5a67d8;
box-shadow:0 0 0 3px rgba(90,103,216,.15);
}

/* ===== BUTTON ===== */

.submit-btn{
background:linear-gradient(135deg,#5a67d8,#7f8cff);
border:none;
color:#fff;
padding:14px;
border-radius:12px;
font-weight:600;
width:100%;
cursor:pointer;
transition:.25s;
}

.submit-btn:hover{
transform:translateY(-2px);
box-shadow:0 12px 24px rgba(90,103,216,.35);
}

/* ===== COMPLAINT GRID ===== */

.ticket-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:16px;
}

/* ===== TICKET CARD ===== */

.ticket-card{
background:#fff;
border-radius:16px;
padding:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
border:1px solid #edf0f7;
transition:.25s;
}

.ticket-card:hover{
transform:translateY(-4px);
box-shadow:0 18px 35px rgba(0,0,0,.12);
}

/* ===== HEADER ===== */

.ticket-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.ticket-title{
font-size:15px;
font-weight:600;
}

.ticket-date{
font-size:12px;
color:#777;
}

/* ===== MESSAGE ===== */

.ticket-desc{
font-size:14px;
color:#555;
margin-top:6px;
}

/* ===== ADMIN REPLY ===== */

.admin-reply{
margin-top:12px;
padding:10px 12px;
background:#eef3ff;
border-left:4px solid #5a67d8;
border-radius:8px;
font-size:13px;
display:flex;
gap:8px;
align-items:flex-start;
}

/* ===== BADGES ===== */

.badges{
display:flex;
gap:6px;
margin-top:12px;
flex-wrap:wrap;
}

.badge{
font-size:11px;
padding:4px 10px;
border-radius:20px;
font-weight:500;
}

/* ===== PRIORITY ===== */

.priority{
background:#eef2ff;
color:#4a5bdc;
}

.priority-Urgent{
background:#ffe5e5;
color:#c53030;
}

.priority-Critical{
background:#ffdddd;
color:#a00000;
}

/* ===== STATUS ===== */

.status-open{
background:#ffe5e5;
color:#c53030;
}

.status-progress{
background:#fff3cd;
color:#856404;
}

.status-resolved{
background:#e6fffa;
color:#065f46;
}

/* ===== EMPTY STATE ===== */

.empty{
text-align:center;
padding:40px;
color:#777;
}

.empty i{
font-size:40px;
margin-bottom:8px;
color:#ccc;
}

</style>

</head>

<body>

<header class="app-header">

<button class="back-btn" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h3 class="page-title">Complaints</h3>

<div style="width:40px"></div>

</header>


<main class="wrapper">

<!-- CREATE COMPLAINT -->

<div class="create-card">

<div class="section-title">
<i class="fa-solid fa-plus-circle"></i>
Submit Complaint
</div>

<input id="title" class="input" placeholder="Complaint title">

<textarea
id="message"
class="input"
rows="4"
placeholder="Describe your issue"></textarea>

<select id="priority" class="input">

<option value="Normal">Normal</option>
<option value="Urgent">Urgent</option>
<option value="Critical">Critical</option>

</select>

<button class="submit-btn" onclick="submitComplaint()">
Submit Complaint
</button>

</div>

<!-- COMPLAINT LIST -->

<div class="section-title">
<i class="fa-solid fa-ticket"></i>
Your Complaints
</div>

<div id="complaintList" class="ticket-grid"></div>

</main>


<script type="module" src="../js/complaints.js"></script>

</body>
</html>
