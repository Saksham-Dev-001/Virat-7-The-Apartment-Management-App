<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Emergency | VIRAT-7</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/header.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

/* ===== PAGE ===== */

body{
margin:0;
font-family:Poppins, sans-serif;
background:#eef1f8;
}

/* ===== CONTENT ===== */

.page-content{
padding:16px;
display:flex;
flex-direction:column;
gap:14px;
}


/* ===== CARD ===== */

.emergency-card{

background:#fff;
border-radius:16px;
padding:16px;

display:flex;
align-items:center;
gap:14px;

box-shadow:0 6px 16px rgba(0,0,0,.08);

cursor:pointer;
transition:.2s;

}

.emergency-card:active{
transform:scale(.97);
}


/* ===== ICON ===== */

.emergency-card i{

font-size:22px;
width:36px;
text-align:center;

color:#5a67d8;

}


/* ===== TEXT ===== */

.emergency-card strong{

font-size:16px;
display:block;

}

.emergency-card span{

font-size:13px;
color:#666;

}


/* COLORS */

.danger i{
color:#e53e3e;
}

.whatsapp i{
color:#25D366;
}

.police i{
color:#2563eb;
}

.fire i{
color:#f97316;
}

</style>

</head>


<body>


<!-- ===== HEADER ===== -->

<header class="app-header">

<button class="back-btn" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h3 class="page-title">Emergency</h3>

<div class="header-spacer"></div>

</header>



<!-- ===== CONTENT ===== -->

<main class="page-content">


<!-- ADMIN -->

<div
class="emergency-card danger"
onclick="callNumber('+919351520926')">

<i class="fa-solid fa-user"></i>

<div>

<strong>Call Admin</strong>

<span>Apartment management</span>

</div>

</div>



<!-- SECURITY -->

<div
class="emergency-card danger"
onclick="callNumber('+919351520926')">

<i class="fa-solid fa-user-shield"></i>

<div>

<strong>Call Security</strong>

<span>Gate & Guards</span>

</div>

</div>



<!-- POLICE -->

<div
class="emergency-card police"
onclick="callNumber('100')">

<i class="fa-solid fa-shield-halved"></i>

<div>

<strong>Police</strong>

<span>Emergency help</span>

</div>

</div>



<!-- FIRE -->

<div
class="emergency-card fire"
onclick="callNumber('101')">

<i class="fa-solid fa-fire-extinguisher"></i>

<div>

<strong>Fire Brigade</strong>

<span>Fire emergency</span>

</div>

</div>



<!-- WHATSAPP -->

<div
class="emergency-card whatsapp"
onclick="openWhatsApp()">

<i class="fa-brands fa-whatsapp"></i>

<div>

<strong>Society WhatsApp</strong>

<span>Residents help group</span>

</div>

</div>


</main>



<script>

function callNumber(number){

window.location.href = "tel:" + number;

}

function openWhatsApp(){

window.open(
"https://whatsapp.com/channel/0029VbBzCYX545uthpIC6N1q",
"_blank"
);

}

</script>


</body>
</html>
