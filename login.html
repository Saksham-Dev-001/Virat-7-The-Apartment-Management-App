<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#5a67d8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login | VIRAT-7</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap"
rel="stylesheet"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#5a67d8,#2d2d86);
}

.login-box{
background:#fff;
padding:40px 30px;
border-radius:16px;
width:90%;
max-width:380px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,.2);
}

.login-box h1{margin-bottom:6px}

.login-box p{
margin-bottom:25px;
color:#555;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
border:1px solid #ddd;
font-size:14px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#5a67d8,#4c51bf);
color:white;
font-size:15px;
cursor:pointer;
margin-top:6px;
}

.google-btn{
margin-top:10px;
background:#4285f4;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.info{
margin-top:15px;
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<div class="login-box">

<h1>VIRAT-7</h1>
<p>Apartment Management Login</p>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button id="loginBtn">Login</button>

<button onclick="googleLogin()" class="google-btn">
<i class="fa-brands fa-google"></i>
Continue with Google
</button>

<div class="info">
<i class="fa-solid fa-circle-info"></i>
Contact admin if you forgot password
</div>

</div>

<script type="module">

import {
googleLogin,
emailLogin,
redirectIfLoggedIn
} from "./js/auth.js";

redirectIfLoggedIn();

window.googleLogin = googleLogin;

document.getElementById("loginBtn").onclick = () => {

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

emailLogin(email,password);

};

</script>

</body>
</html>
